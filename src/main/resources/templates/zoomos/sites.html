<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{__${_layout ?: 'layout/main'}__ :: html(
        title='Справочник сайтов',
        content=~{::content},
        scripts=~{::scripts},
        styles=~{::styles},
        pageTitle='Справочник сайтов',
        pageActions=~{::pageActions}
      )}">
<head><title>Справочник сайтов</title></head>

<th:block th:fragment="styles">
<style>
    .site-name-cell { font-family: monospace; font-size: 0.9em; }
</style>
</th:block>

<th:block th:fragment="pageActions">
    <a th:href="@{/zoomos}" class="btn btn-sm btn-outline-secondary">
        <i class="fas fa-arrow-left me-1"></i>К магазинам
    </a>
</th:block>

<th:block th:fragment="content">
<div class="container-fluid">

    <!-- Форма добавления -->
    <div class="card mb-4">
        <div class="card-header py-2"><i class="fas fa-plus me-2"></i>Добавить сайт(ы)</div>
        <div class="card-body py-3">
            <div class="d-flex gap-2 align-items-center flex-wrap">
                <input type="text" id="addSiteNames" class="form-control"
                       style="min-width:280px; max-width:460px"
                       placeholder="site1.by, site2.by (через запятую)">
                <select id="addCheckType" class="form-select" style="width:auto">
                    <option value="ITEM" selected>ITEM</option>
                    <option value="API">API</option>
                </select>
                <button type="button" class="btn btn-primary" id="addSitesBtn">
                    <i class="fas fa-plus me-1"></i>Добавить
                </button>
            </div>
            <div class="form-text mt-1">Можно указать несколько сайтов через запятую</div>
            <div id="addResult" class="mt-2 small d-none"></div>
        </div>
    </div>

    <!-- Фильтр -->
    <div class="mb-3 d-flex align-items-center gap-2 flex-wrap">
        <input type="text" id="siteSearch" class="form-control form-control-sm w-auto"
               placeholder="Фильтр по имени сайта..." style="min-width:260px">
        <select id="sitesPageSize" class="form-select form-select-sm w-auto" title="Строк на странице">
            <option value="25">25</option>
            <option value="50">50</option>
            <option value="100">100</option>
            <option value="0">Все</option>
        </select>
        <span id="searchCount" class="text-muted small"></span>
    </div>

    <!-- Таблица -->
    <div class="card">
        <div class="card-body p-0">
            <div th:if="${sites.empty}" class="text-muted text-center py-4">
                <i class="fas fa-book fa-2x mb-2 d-block"></i>
                Справочник пуст. Добавьте сайты вручную или синхронизируйте магазин.
            </div>
            <table th:unless="${sites.empty}" class="table table-sm table-hover table-bordered mb-0" id="sitesTable">
                <thead class="table-light">
                    <tr>
                        <th style="width:40px" class="text-center">#</th>
                        <th>Сайт</th>
                        <th style="width:150px" class="text-center">Тип выкачки</th>
                        <th style="width:80px" class="text-center">Приоритет</th>
                        <th style="width:80px" class="text-center" title="Не отслеживать «В наличии» для этого сайта">Без наличия</th>
                        <th style="width:140px" class="text-center" title="CITIES_EQUAL_PRICES — цены одинаковы во всех городах">
                            Равные цены
                            <button type="button" class="btn btn-sm btn-outline-secondary py-0 px-1 ms-1" id="fetchAllEqualPricesBtn"
                                    title="Проверить все сайты">
                                <i class="fas fa-sync-alt"></i>
                            </button>
                        </th>
                        <th style="width:150px" class="text-center d-none d-lg-table-cell">Добавлен</th>
                        <th style="width:80px" class="text-center">Действия</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="site, si : ${sites}" th:id="'site-row-' + ${site.id}">
                        <td class="text-center text-muted small" th:text="${si.count}"></td>
                        <td class="site-name-cell" th:text="${site.siteName}"></td>
                        <td class="text-center">
                            <select class="form-select form-select-sm site-check-type"
                                    th:data-id="${site.id}"
                                    style="font-size:0.85em; padding:3px 24px 3px 8px;">
                                <option value="ITEM" th:selected="${site.checkType == 'ITEM'}">ITEM</option>
                                <option value="API" th:selected="${site.checkType == 'API'}">API</option>
                            </select>
                        </td>
                        <td class="text-center">
                            <button type="button"
                                    th:class="${site.isPriority} ? 'btn btn-sm py-0 px-2 priority-toggle-btn btn-warning' : 'btn btn-sm py-0 px-2 priority-toggle-btn btn-outline-secondary'"
                                    th:data-id="${site.id}"
                                    th:title="${site.isPriority} ? 'Приоритетный — показывать в баннере' : 'Обычный — нажмите чтобы отметить как приоритетный'">
                                <i th:class="${site.isPriority} ? 'fas fa-star' : 'far fa-star'"></i>
                            </button>
                        </td>
                        <td class="text-center">
                            <button type="button"
                                    th:class="${site.ignoreStock} ? 'btn btn-sm py-0 px-2 ignore-stock-btn btn-warning' : 'btn btn-sm py-0 px-2 ignore-stock-btn btn-outline-secondary'"
                                    th:data-id="${site.id}"
                                    th:title="${site.ignoreStock} ? 'Наличие не отслеживается — нажмите чтобы включить' : 'Нажмите чтобы отключить отслеживание наличия'">
                                <i th:class="${site.ignoreStock} ? 'fas fa-eye-slash' : 'far fa-eye'"></i>
                            </button>
                        </td>
                        <td class="text-center equal-prices-cell" th:data-id="${site.id}"
                            th:data-equal="${site.citiesEqualPrices}"
                            th:data-checked="${site.citiesEqualPricesCheckedAt != null} ? ${#temporals.format(site.citiesEqualPricesCheckedAt, 'dd.MM.yyyy HH:mm')} : ''">
                            <th:block th:if="${site.citiesEqualPrices != null}">
                                <span th:class="${site.citiesEqualPrices} ? 'badge bg-success' : 'badge bg-secondary'"
                                      th:text="${site.citiesEqualPrices} ? '= цены' : 'разные'"
                                      th:title="${'Проверено: ' + (#temporals.format(site.citiesEqualPricesCheckedAt, 'dd.MM.yyyy HH:mm'))}"></span>
                            </th:block>
                            <button type="button"
                                    class="btn btn-sm btn-outline-secondary py-0 px-1 fetch-equal-prices-btn"
                                    th:data-id="${site.id}"
                                    th:data-name="${site.siteName}"
                                    title="Проверить CITIES_EQUAL_PRICES">
                                <i class="fas fa-sync-alt" style="font-size:0.75em"></i>
                            </button>
                        </td>
                        <td class="text-center small text-muted d-none d-lg-table-cell"
                            th:text="${site.createdAt != null} ? ${#temporals.format(site.createdAt, 'dd.MM.yyyy')} : '—'"></td>
                        <td class="text-center">
                            <button type="button" class="btn btn-sm btn-outline-danger py-0 px-2 delete-site-btn"
                                    th:data-id="${site.id}"
                                    th:data-name="${site.siteName}"
                                    title="Удалить">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Модальное окно: исторические города -->
    <div class="modal fade" id="equalPricesModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header py-2">
                    <h6 class="modal-title"><i class="fas fa-city me-2"></i>Города для <span id="equalPricesModalSite"></span></h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="equalPricesModalBody" class="small">Загрузка...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Пагинация -->
    <div id="sitesPagination" class="d-flex justify-content-between align-items-center mt-2 flex-wrap gap-2" style="display:none!important">
        <span id="sitesPaginationInfo" class="text-muted small"></span>
        <nav><ul class="pagination pagination-sm mb-0" id="sitesPaginationPages"></ul></nav>
    </div>

</div>
</th:block>

<th:block th:fragment="scripts">
<script>
    // ---- Добавление сайтов ----
    document.getElementById('addSitesBtn').addEventListener('click', function() {
        const names = document.getElementById('addSiteNames').value.trim();
        const checkType = document.getElementById('addCheckType').value;
        const resultEl = document.getElementById('addResult');
        if (!names) { resultEl.textContent = 'Введите имя сайта'; resultEl.className = 'mt-2 small text-danger'; return; }

        const fd = new FormData();
        fd.append('siteNames', names);
        fd.append('checkType', checkType);

        fetch('/zoomos/sites/add', { method: 'POST', body: fd })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    const added = data.added || [];
                    const skipped = data.skipped || [];
                    let msg = '';
                    if (added.length) msg += 'Добавлено: ' + added.join(', ') + '. ';
                    if (skipped.length) msg += 'Уже есть: ' + skipped.join(', ') + '.';
                    resultEl.textContent = msg || 'Готово';
                    resultEl.className = 'mt-2 small text-success';
                    if (added.length) setTimeout(() => location.reload(), 800);
                } else {
                    resultEl.textContent = 'Ошибка: ' + (data.error || 'неизвестная');
                    resultEl.className = 'mt-2 small text-danger';
                }
                resultEl.classList.remove('d-none');
            })
            .catch(() => {
                resultEl.textContent = 'Ошибка сети';
                resultEl.className = 'mt-2 small text-danger d-block';
            });
    });

    // Enter в поле ввода
    document.getElementById('addSiteNames').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') document.getElementById('addSitesBtn').click();
    });

    // ---- Изменение типа выкачки ----
    document.querySelectorAll('.site-check-type').forEach(sel => {
        sel.addEventListener('change', function() {
            const id = this.dataset.id;
            const fd = new FormData();
            fd.append('checkType', this.value);
            fetch('/zoomos/sites/' + id + '/check-type', { method: 'POST', body: fd })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        this.style.borderColor = '#198754';
                        setTimeout(() => { this.style.borderColor = ''; }, 1000);
                    } else {
                        alert('Ошибка: ' + (data.error || 'неизвестная'));
                    }
                })
                .catch(() => alert('Ошибка сети'));
        });
    });

    // ---- Удаление сайта ----
    document.querySelectorAll('.delete-site-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const id = this.dataset.id;
            const name = this.dataset.name;
            if (!confirm('Удалить сайт "' + name + '" из справочника?')) return;

            fetch('/zoomos/sites/' + id + '/delete', { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        document.getElementById('site-row-' + id).remove();
                        updateSearchCount();
                    } else {
                        alert('Ошибка: ' + (data.error || 'неизвестная'));
                    }
                })
                .catch(() => alert('Ошибка сети'));
        });
    });

    // ---- Toggle приоритета ----
    document.querySelectorAll('.priority-toggle-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const id = this.dataset.id;
            fetch('/zoomos/sites/' + id + '/priority', { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        const isPriority = data.isPriority;
                        this.className = isPriority
                            ? 'btn btn-sm py-0 px-2 priority-toggle-btn btn-warning'
                            : 'btn btn-sm py-0 px-2 priority-toggle-btn btn-outline-secondary';
                        this.querySelector('i').className = isPriority ? 'fas fa-star' : 'far fa-star';
                        this.title = isPriority
                            ? 'Приоритетный — показывать в баннере'
                            : 'Обычный — нажмите чтобы отметить как приоритетный';
                    } else {
                        alert('Ошибка: ' + (data.error || 'неизвестная'));
                    }
                })
                .catch(() => alert('Ошибка сети'));
        });
    });

    // ---- Toggle "без наличия" ----
    document.querySelectorAll('.ignore-stock-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const id = this.dataset.id;
            fetch('/zoomos/sites/' + id + '/ignore-stock', { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        const ignored = data.ignoreStock;
                        this.className = ignored
                            ? 'btn btn-sm py-0 px-2 ignore-stock-btn btn-warning'
                            : 'btn btn-sm py-0 px-2 ignore-stock-btn btn-outline-secondary';
                        this.querySelector('i').className = ignored ? 'fas fa-eye-slash' : 'far fa-eye';
                        this.title = ignored
                            ? 'Наличие не отслеживается — нажмите чтобы включить'
                            : 'Нажмите чтобы отключить отслеживание наличия';
                    } else {
                        alert('Ошибка: ' + (data.error || 'неизвестная'));
                    }
                })
                .catch(() => alert('Ошибка сети'));
        });
    });

    // ---- Фильтр + пагинация ----
    const siteSearch    = document.getElementById('siteSearch');
    const countEl       = document.getElementById('searchCount');
    const sitesPageSize = document.getElementById('sitesPageSize');
    const sitesPag      = document.getElementById('sitesPagination');
    const sitesPagPages = document.getElementById('sitesPaginationPages');
    const sitesPagInfo  = document.getElementById('sitesPaginationInfo');
    const SITES_PS_KEY  = 'zoomos-sites-page-size';
    let sitesCurrentPage = 1;

    const savedSitesPSize = localStorage.getItem(SITES_PS_KEY);
    if (savedSitesPSize && sitesPageSize) {
        const opt = sitesPageSize.querySelector(`option[value="${savedSitesPSize}"]`);
        if (opt) opt.selected = true;
    }

    function getSitesPageSize() { return sitesPageSize ? parseInt(sitesPageSize.value) : 25; }

    function filterSites() {
        const q = siteSearch ? siteSearch.value.trim().toLowerCase() : '';
        const allRows = Array.from(document.querySelectorAll('#sitesTable tbody tr'));
        const matched = allRows.filter(r => {
            const name = r.querySelector('.site-name-cell')?.textContent.toLowerCase() || '';
            return !q || name.includes(q);
        });

        const pageSize = getSitesPageSize();
        const totalMatched = matched.length;
        const totalPages = pageSize === 0 ? 1 : Math.ceil(totalMatched / pageSize);
        if (sitesCurrentPage > totalPages) sitesCurrentPage = 1;

        allRows.forEach(r => r.style.display = 'none');
        const start = pageSize === 0 ? 0 : (sitesCurrentPage - 1) * pageSize;
        const end   = pageSize === 0 ? totalMatched : start + pageSize;
        matched.slice(start, end).forEach(r => r.style.display = '');

        if (countEl) {
            countEl.textContent = q ? `Найдено: ${totalMatched} из ${allRows.length}` : `Всего: ${allRows.length}`;
        }

        if (pageSize > 0 && totalPages > 1) {
            sitesPag.style.removeProperty('display');
            sitesPagInfo.textContent = `Страница ${sitesCurrentPage} из ${totalPages} (${totalMatched} записей)`;
            renderSitesPages(totalPages);
        } else {
            sitesPag.style.setProperty('display', 'none', 'important');
        }
    }

    function renderSitesPages(total) {
        sitesPagPages.innerHTML = '';
        const prev = document.createElement('li');
        prev.className = 'page-item' + (sitesCurrentPage === 1 ? ' disabled' : '');
        prev.innerHTML = '<a class="page-link" href="#">‹</a>';
        prev.addEventListener('click', e => { e.preventDefault(); if (sitesCurrentPage > 1) { sitesCurrentPage--; filterSites(); }});
        sitesPagPages.appendChild(prev);

        const pages = new Set([1, total]);
        for (let i = Math.max(1, sitesCurrentPage - 2); i <= Math.min(total, sitesCurrentPage + 2); i++) pages.add(i);
        let last = 0;
        [...pages].sort((a,b)=>a-b).forEach(p => {
            if (last && p - last > 1) {
                const dots = document.createElement('li');
                dots.className = 'page-item disabled';
                dots.innerHTML = '<a class="page-link">…</a>';
                sitesPagPages.appendChild(dots);
            }
            const li = document.createElement('li');
            li.className = 'page-item' + (p === sitesCurrentPage ? ' active' : '');
            li.innerHTML = `<a class="page-link" href="#">${p}</a>`;
            li.addEventListener('click', e => { e.preventDefault(); sitesCurrentPage = p; filterSites(); });
            sitesPagPages.appendChild(li);
            last = p;
        });

        const next = document.createElement('li');
        next.className = 'page-item' + (sitesCurrentPage === total ? ' disabled' : '');
        next.innerHTML = '<a class="page-link" href="#">›</a>';
        next.addEventListener('click', e => { e.preventDefault(); if (sitesCurrentPage < total) { sitesCurrentPage++; filterSites(); }});
        sitesPagPages.appendChild(next);
    }

    function updateSearchCount() { filterSites(); }

    if (sitesPageSize) {
        sitesPageSize.addEventListener('change', () => {
            localStorage.setItem(SITES_PS_KEY, sitesPageSize.value);
            sitesCurrentPage = 1;
            filterSites();
        });
    }
    if (siteSearch) {
        siteSearch.addEventListener('input', () => { sitesCurrentPage = 1; filterSites(); });
    }

    filterSites();

    // ---- Проверка CITIES_EQUAL_PRICES для одного сайта ----
    document.querySelectorAll('.fetch-equal-prices-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const id = this.dataset.id;
            const name = this.dataset.name;
            const icon = this.querySelector('i');
            icon.classList.add('fa-spin');
            this.disabled = true;

            fetch('/zoomos/sites/' + id + '/fetch-equal-prices', { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    icon.classList.remove('fa-spin');
                    this.disabled = false;
                    if (data.success) {
                        const cell = this.closest('.equal-prices-cell');
                        // обновляем бейдж
                        let badge = cell.querySelector('.badge');
                        if (!badge) {
                            badge = document.createElement('span');
                            cell.insertBefore(badge, this);
                        }
                        if (data.citiesEqualPrices === true) {
                            badge.className = 'badge bg-success';
                            badge.textContent = '= цены';
                            // показываем исторические города в модальном окне
                            const modal = new bootstrap.Modal(document.getElementById('equalPricesModal'));
                            document.getElementById('equalPricesModalSite').textContent = name;
                            const cities = data.historicalCities || [];
                            document.getElementById('equalPricesModalBody').innerHTML = cities.length
                                ? '<p class="text-success mb-2"><i class="fas fa-check-circle me-1"></i>Цены одинаковы во всех городах.</p>'
                                  + '<p class="text-muted mb-1">Исторические города:</p>'
                                  + '<ul class="list-unstyled mb-0">' + cities.map(c => '<li><code>' + c + '</code></li>').join('') + '</ul>'
                                : '<p class="text-success mb-0"><i class="fas fa-check-circle me-1"></i>Цены одинаковы во всех городах. Исторических городов нет.</p>';
                            modal.show();
                        } else if (data.citiesEqualPrices === false) {
                            badge.className = 'badge bg-secondary';
                            badge.textContent = 'разные';
                        } else {
                            badge.remove();
                        }
                    } else {
                        alert('Ошибка: ' + (data.error || 'неизвестная'));
                    }
                })
                .catch(() => {
                    icon.classList.remove('fa-spin');
                    this.disabled = false;
                    alert('Ошибка сети');
                });
        });
    });

    // ---- Проверка CITIES_EQUAL_PRICES для всех сайтов ----
    document.getElementById('fetchAllEqualPricesBtn').addEventListener('click', function() {
        if (!confirm('Запустить проверку CITIES_EQUAL_PRICES для всех сайтов в фоне?')) return;
        const icon = this.querySelector('i');
        icon.classList.add('fa-spin');
        this.disabled = true;
        fetch('/zoomos/sites/fetch-equal-prices-all', { method: 'POST' })
            .then(r => r.json())
            .then(data => {
                icon.classList.remove('fa-spin');
                this.disabled = false;
                if (data.success) {
                    alert('Проверка запущена в фоне. Обновите страницу через несколько минут.');
                } else {
                    alert('Ошибка: ' + (data.error || 'неизвестная'));
                }
            })
            .catch(() => {
                icon.classList.remove('fa-spin');
                this.disabled = false;
                alert('Ошибка сети');
            });
    });
</script>
</th:block>

</html>
