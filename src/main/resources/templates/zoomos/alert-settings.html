<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{__${_layout ?: 'layout/tabler-main'}__ :: html(
        title='Пороги оповещений',
        content=~{::content},
        scripts=~{::scripts},
        styles=~{::styles},
        pageTitle='Пороги оповещений',
        pageActions=~{::pageActions}
      )}">
<head><title>Пороги оповещений</title></head>

<th:block th:fragment="styles">
    <style>
        body { background: #080b10 !important; }
        .page-wrapper { background: #080b10 !important; }
        #alert-settings-root { min-height: calc(100vh - 120px); }
    </style>
</th:block>

<th:block th:fragment="pageActions">
    <a th:href="@{/zoomos}" class="btn btn-sm btn-outline-secondary">← Назад</a>
</th:block>

<div th:fragment="content">
    <div id="alert-settings-root"></div>
</div>

<th:block th:fragment="scripts">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
        const { useState, useCallback } = React;

        // ─── Constants ────────────────────────────────────────────────────────────────

        const PRESETS = [
          { name: "Консервативный",  pct: 50, abs: 120, logic: "AND", sigma: 3,   window: 10, minAbs: 120 },
          { name: "Сбалансированный", pct: 30, abs: 60,  logic: "AND", sigma: 2,   window: 5,  minAbs: 60  },
          { name: "Чувствительный",  pct: 15, abs: 30,  logic: "OR",  sigma: 1.5, window: 5,  minAbs: 30  },
        ];

        const TEST_CASES = [
          { label: "1 → 7",     prev: 1,   curr: 7,   note: "мелкий рост, не критично" },
          { label: "500 → 700", prev: 500, curr: 700, note: "крупный рост, критично"   },
          { label: "60 → 90",   prev: 60,  curr: 90,  note: "умеренный рост"           },
          { label: "200 → 250", prev: 200, curr: 250, note: "небольшой рост"           },
          { label: "5 → 50",    prev: 5,   curr: 50,  note: "900% — но с малой базы"  },
          { label: "300 → 600", prev: 300, curr: 600, note: "удвоение времени"        },
        ];

        // ─── Logic ────────────────────────────────────────────────────────────────────

        function checkSimple(prev, curr, pct, abs, logic) {
          const diff    = curr - prev;
          const pctVal  = prev > 0 ? (diff / prev) * 100 : 0;
          const passPct = pctVal >= pct;
          const passAbs = diff   >= abs;
          return { triggered: logic === "AND" ? passPct && passAbs : passPct || passAbs, diff, pctVal, passPct, passAbs };
        }

        function checkAdvanced(prev, curr, sigma, minAbs) {
          const diff         = curr - prev;
          const estimatedStd = Math.max(prev * 0.15, 1);
          const zScore       = diff / estimatedStd;
          const passZ        = zScore >= sigma;
          const passAbs      = diff   >= minAbs;
          return { triggered: passZ && passAbs, diff, zScore, passZ, passAbs };
        }

        // ─── Sub-components ───────────────────────────────────────────────────────────

        function SliderRow({ label, value, min, max, step = 1, unit = "", onChange, leftLabel, rightLabel }) {
          return (
            <div style={{ marginBottom: 24 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 10 }}>
                <label style={{ fontSize: 12, color: "#8b949e", letterSpacing: 0.5 }}>{label}</label>
                <span style={{ fontSize: 20, fontWeight: 700, color: "#e2c97e", textShadow: "0 0 12px rgba(226,201,126,0.3)", minWidth: 80, textAlign: "right" }}>
                  {value}{unit}
                </span>
              </div>
              <input type="range" min={min} max={max} step={step} value={value} onChange={e => onChange(Number(e.target.value))} />
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: "#3d4451", marginTop: 5 }}>
                <span>{leftLabel ?? min}{unit}</span>
                <span>{rightLabel ?? max}{unit}</span>
              </div>
            </div>
          );
        }

        function StatusBadge({ triggered }) {
          return (
            <span style={{
              fontSize: 10, fontWeight: 700, letterSpacing: 1.5,
              padding: "3px 10px", borderRadius: 3,
              background: triggered ? "rgba(248,81,73,0.15)" : "rgba(56,193,114,0.1)",
              color:      triggered ? "#f85149"               : "#38c172",
              border:     `1px solid ${triggered ? "rgba(248,81,73,0.3)" : "rgba(56,193,114,0.2)"}`,
            }}>
              {triggered ? "ПРОБЛЕМА" : "OK"}
            </span>
          );
        }

        function Metric({ label, value, pass }) {
          return (
            <span style={{ fontSize: 11 }}>
              <span style={{ color: "#2a3040" }}>{label} </span>
              <span style={{ color: pass ? "#f85149" : "#38c172", fontWeight: 600 }}>{value}</span>
            </span>
          );
        }

        function FormulaBox({ children }) {
          return (
            <div style={{
              marginTop: 20, padding: "14px 16px", borderRadius: 4,
              background: "#080b10", border: "1px solid #1a1f2e",
              fontSize: 11, color: "#484f58", lineHeight: 2,
            }}>
              <span style={{ fontSize: 9, letterSpacing: 2, color: "#2a3040", display: "block", marginBottom: 6 }}>ФОРМУЛА</span>
              {children}
            </div>
          );
        }

        // ─── Main ─────────────────────────────────────────────────────────────────────

        function AlertSettings() {
          const [mode,        setMode]        = useState("simple");
          const [pct,         setPct]         = useState(30);
          const [abs,         setAbs]         = useState(60);
          const [logic,       setLogic]       = useState("AND");
          const [sigma,       setSigma]       = useState(2);
          const [histWindow,  setHistWindow]  = useState(5);
          const [minAbs,      setMinAbs]      = useState(60);
          const [customPrev,  setCustomPrev]  = useState("");
          const [customCurr,  setCustomCurr]  = useState("");
          const [activePreset, setActivePreset] = useState(1);

          const applyPreset = useCallback((p, idx) => {
            setPct(p.pct); setAbs(p.abs); setLogic(p.logic);
            setSigma(p.sigma); setHistWindow(p.window); setMinAbs(p.minAbs);
            setActivePreset(idx);
          }, []);

          const hs = (setter) => (val) => { setter(val); setActivePreset(null); };

          const evaluate = (prev, curr) =>
            mode === "simple"
              ? checkSimple(prev, curr, pct, abs, logic)
              : checkAdvanced(prev, curr, sigma, minAbs);

          const allCases = [...TEST_CASES];
          const cp = Number(customPrev), cc = Number(customCurr);
          if (cp > 0 && cc > 0) allCases.push({ label: `${cp} → ${cc}`, prev: cp, curr: cc, note: "пользовательский сценарий", custom: true });

          const results    = allCases.map(tc => ({ ...tc, result: evaluate(tc.prev, tc.curr) }));
          const alertCount = results.filter(r => r.result.triggered).length;

          return (
            <div style={{
              fontFamily: "'JetBrains Mono', 'Fira Code', monospace",
              background: "#080b10", color: "#c9d1d9",
              minHeight: "100%", padding: "8px 4px 60px",
            }}>
              <style>{`
                @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');
                input[type=range] {
                  -webkit-appearance: none; appearance: none;
                  width: 100%; height: 4px; border-radius: 2px;
                  background: linear-gradient(to right, #e2c97e var(--val, 50%), #1e2433 var(--val, 50%));
                  outline: none; cursor: pointer;
                }
                input[type=range]::-webkit-slider-thumb {
                  -webkit-appearance: none; appearance: none;
                  width: 16px; height: 16px; border-radius: 50%;
                  background: #e2c97e; cursor: pointer;
                  border: 2px solid #080b10;
                  box-shadow: 0 0 10px rgba(226,201,126,0.5);
                  transition: transform 0.1s;
                }
                input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
                .as-input[type=number] {
                  background: #0d1117; border: 1px solid #1e2433;
                  color: #c9d1d9; border-radius: 4px; padding: 8px 12px;
                  font-family: inherit; font-size: 13px; width: 100%;
                  outline: none; transition: border-color 0.2s;
                  -moz-appearance: textfield;
                }
                .as-input[type=number]:focus { border-color: #e2c97e; box-shadow: 0 0 0 2px rgba(226,201,126,0.1); }
                .as-input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
                .as-tab { flex: 1; padding: 10px 16px; border: none; border-radius: 5px; cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 500; transition: all 0.2s; text-align: left; }
                .as-tab-active { background: #131a26 !important; color: #e6edf3 !important; border-left: 2px solid #e2c97e !important; }
                .as-tab-inactive { background: transparent !important; color: #3d4451 !important; }
                .as-tab-inactive:hover { color: #8b949e !important; background: #0d1117 !important; }
                .as-preset { padding: 5px 14px; border-radius: 3px; cursor: pointer; font-family: inherit; font-size: 11px; font-weight: 500; transition: all 0.2s; letter-spacing: 0.5px; border: 1px solid #1e2433; background: transparent; color: #484f58; }
                .as-preset:hover { border-color: #3d4451!important; color: #8b949e!important; }
                .as-preset-active { background: rgba(226,201,126,0.1)!important; border-color: rgba(226,201,126,0.4)!important; color: #e2c97e!important; }
                .as-sim-row { display: grid; grid-template-columns: 120px 1fr auto; align-items: center; gap: 12px; padding: 10px 14px; border-radius: 4px; border: 1px solid transparent; transition: all 0.3s; margin-bottom: 6px; }
                .as-sim-alert { background: rgba(248,81,73,0.06); border-color: rgba(248,81,73,0.18)!important; }
                .as-sim-ok    { background: rgba(56,193,114,0.04); border-color: rgba(56,193,114,0.1)!important; }
              `}</style>

              <div style={{ maxWidth: 720, margin: "0 auto" }}>

                {/* Mode + Presets */}
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24, flexWrap: "wrap", gap: 12 }}>
                  <div style={{ display: "flex", gap: 2, background: "#0d1117", borderRadius: 6, padding: 3 }}>
                    {[["simple","Базовый"],["advanced","Продвинутый"]].map(([key, label]) => (
                      <button key={key} className={`as-tab ${mode===key?"as-tab-active":"as-tab-inactive"}`} onClick={() => setMode(key)}>{label}</button>
                    ))}
                  </div>
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                    {PRESETS.map((p, i) => (
                      <button key={p.name} className={`as-preset ${activePreset===i?"as-preset-active":""}`} onClick={() => applyPreset(p, i)}>{p.name}</button>
                    ))}
                  </div>
                </div>

                {/* Settings */}
                <div style={{ background: "#0d1117", border: "1px solid #1e2433", borderRadius: 8, padding: "28px 28px 24px", marginBottom: 24 }}>
                  {mode === "simple" ? (
                    <div key="simple">
                      <SliderRow label="Порог роста в процентах" value={pct} min={5} max={500} unit="%" onChange={hs(setPct)} leftLabel="5%" rightLabel="500%" />
                      <div style={{ display: "flex", alignItems: "center", gap: 12, margin: "4px 0 24px" }}>
                        <span style={{ fontSize: 11, color: "#3d4451", flexShrink: 0 }}>Логика:</span>
                        <div style={{ display: "flex", borderRadius: 4, overflow: "hidden", border: "1px solid #1e2433" }}>
                          {["AND","OR"].map(l => (
                            <button key={l} onClick={() => { setLogic(l); setActivePreset(null); }} style={{
                              padding: "7px 20px", border: "none", cursor: "pointer",
                              fontFamily: "inherit", fontSize: 12, fontWeight: 700, transition: "all 0.2s",
                              background: logic===l ? (l==="AND"?"rgba(56,193,114,0.15)":"rgba(226,201,126,0.12)") : "#080b10",
                              color:      logic===l ? (l==="AND"?"#38c172":"#e2c97e") : "#3d4451",
                            }}>{l}</button>
                          ))}
                        </div>
                        <span style={{ fontSize: 11, color: "#484f58" }}>
                          {logic==="AND" ? "оба условия — меньше ложных срабатываний" : "любое условие — не пропустит крупные проблемы"}
                        </span>
                      </div>
                      <SliderRow label="Порог абсолютного роста" value={abs} min={1} max={500} unit=" мин" onChange={hs(setAbs)} leftLabel="1 мин" rightLabel="500 мин" />
                      <FormulaBox>
                        triggered = (<span style={{color:"#e2c97e",fontWeight:700}}>{pct}%</span> ≤ рост%)
                        {" "}<span style={{color:"#58a6ff",fontWeight:700}}>{logic==="AND"?"&&":"||"}</span>{" "}
                        (<span style={{color:"#e2c97e",fontWeight:700}}>{abs} мин</span> ≤ рост_мин)
                      </FormulaBox>
                    </div>
                  ) : (
                    <div key="advanced">
                      <SliderRow label="Окно истории (последних проверок)" value={histWindow} min={3} max={30} onChange={hs(setHistWindow)} leftLabel="3" rightLabel="30" />
                      <SliderRow label="Чувствительность (σ)" value={sigma} min={1} max={4} step={0.5} onChange={hs(setSigma)} leftLabel="1σ чувствительно" rightLabel="4σ только аномалии" />
                      <SliderRow label="Минимальный абсолютный рост" value={minAbs} min={1} max={500} unit=" мин" onChange={hs(setMinAbs)} leftLabel="1 мин" rightLabel="500 мин" />
                      <FormulaBox>
                        z = (curr - prev) / std<br/>
                        std ≈ prev × 0.15 · baseline: последние <span style={{color:"#e2c97e",fontWeight:700}}>{histWindow}</span> проверок<br/>
                        triggered = (z ≥ <span style={{color:"#e2c97e",fontWeight:700}}>{sigma}σ</span>) <span style={{color:"#58a6ff",fontWeight:700}}>&&</span> (рост_мин ≥ <span style={{color:"#e2c97e",fontWeight:700}}>{minAbs}</span>)
                      </FormulaBox>
                    </div>
                  )}
                </div>

                {/* Simulator */}
                <div style={{ background: "#0d1117", border: "1px solid #1e2433", borderRadius: 8, padding: "24px 24px 20px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18 }}>
                    <span style={{ fontSize: 10, letterSpacing: 2.5, color: "#3d4451", textTransform: "uppercase" }}>симулятор</span>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 11 }}>
                      <span style={{ color: "#3d4451" }}>срабатывает</span>
                      <span style={{ fontWeight: 700, fontSize: 16, color: alertCount > 0 ? "#f85149" : "#38c172", transition: "all 0.3s" }}>{alertCount}</span>
                      <span style={{ color: "#3d4451" }}>из {results.length}</span>
                    </div>
                  </div>

                  <div style={{ display: "grid", gridTemplateColumns: "120px 1fr auto", gap: 12, paddingBottom: 8, marginBottom: 4, borderBottom: "1px solid #1a1f2e" }}>
                    {["сценарий", mode==="simple"?"pct / абс":"z / абс", "статус"].map(h => (
                      <span key={h} style={{ fontSize: 9, color: "#2a3040", letterSpacing: 2, textTransform: "uppercase" }}>{h}</span>
                    ))}
                  </div>

                  {results.map((tc, i) => {
                    const { triggered, diff, pctVal, zScore, passZ, passAbs, passPct } = tc.result;
                    return (
                      <div key={i} className={`as-sim-row ${triggered?"as-sim-alert":"as-sim-ok"}`}>
                        <div>
                          <div style={{ fontSize: 13, fontWeight: 600, color: "#c9d1d9" }}>
                            {tc.label} мин {tc.custom && <span style={{ fontSize: 9, color: "#e2c97e" }}>★</span>}
                          </div>
                          <div style={{ fontSize: 10, color: "#2a3040", marginTop: 2 }}>{tc.note}</div>
                        </div>
                        <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
                          {mode === "simple"
                            ? <>
                                <Metric label="%" value={`${Math.round(pctVal)}%`} pass={passPct} />
                                <Metric label="мин" value={`+${diff}`} pass={passAbs} />
                              </>
                            : <>
                                <Metric label="z" value={zScore != null ? zScore.toFixed(2) : "—"} pass={passZ} />
                                <Metric label="мин" value={`+${diff}`} pass={passAbs} />
                              </>
                          }
                        </div>
                        <StatusBadge triggered={triggered} />
                      </div>
                    );
                  })}

                  <div style={{ display: "flex", gap: 10, alignItems: "center", marginTop: 16, paddingTop: 16, borderTop: "1px solid #1a1f2e" }}>
                    <span style={{ fontSize: 10, color: "#3d4451", whiteSpace: "nowrap", letterSpacing: 1 }}>ТЕСТ:</span>
                    <input className="as-input" type="number" placeholder="было, мин" min={0} value={customPrev} onChange={e => setCustomPrev(e.target.value)} />
                    <span style={{ color: "#2a3040", fontSize: 16, flexShrink: 0 }}>→</span>
                    <input className="as-input" type="number" placeholder="стало, мин" min={0} value={customCurr} onChange={e => setCustomCurr(e.target.value)} />
                  </div>
                </div>

              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('alert-settings-root'));
        root.render(React.createElement(AlertSettings));
    </script>
</th:block>
</html>
