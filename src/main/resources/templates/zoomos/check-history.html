<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{__${_layout ?: 'layout/main'}__ :: html(
        title='История проверок',
        content=~{::content},
        scripts=~{::scripts},
        styles=~{::styles},
        pageTitle='История проверок',
        pageActions=~{::pageActions}
      )}">
<head><title>История проверок</title></head>

<th:block th:fragment="styles"></th:block>

<th:block th:fragment="pageActions">
    <a th:href="@{/zoomos}" class="btn btn-sm btn-outline-secondary">
        <i class="fas fa-arrow-left me-1"></i>Назад
    </a>
</th:block>

<th:block th:fragment="content">
<div class="container-fluid">

    <!-- Flash-сообщение -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show mb-3" role="alert">
        <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${runs.empty}" class="text-muted text-center py-4">
        <i class="fas fa-history fa-2x mb-2 d-block"></i>
        Проверок ещё не было. Перейдите на страницу проверки.
    </div>

    <div th:unless="${runs.empty}" class="mb-3 d-flex align-items-center gap-2 flex-wrap">
        <input type="text" id="historySearch" class="form-control form-control-sm w-auto"
               placeholder="Фильтр по магазину..." style="min-width:220px"
               th:value="${shopFilter}">
        <button class="btn btn-sm btn-outline-secondary" type="button" id="historySearchClear" title="Сбросить фильтр">
            <i class="fas fa-times"></i>
        </button>
        <select id="historyPageSize" class="form-select form-select-sm w-auto" title="Строк на странице">
            <option value="10">10</option>
            <option value="25">25</option>
            <option value="50">50</option>
            <option value="100">100</option>
            <option value="0">Все</option>
        </select>
        <span id="historyCount" class="text-muted small"></span>

        <button type="button" id="btnDeleteSelected" class="btn btn-sm btn-danger ms-auto" style="display:none">
            <i class="fas fa-trash me-1"></i>Удалить выбранные (<span id="selectedCount">0</span>)
        </button>
    </div>

    <!-- Форма удаления (скрытая) -->
    <form id="deleteForm" th:action="@{/zoomos/check/history/delete}" method="post" style="display:none"></form>

    <div th:unless="${runs.empty}" class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-sm table-hover table-bordered mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="text-center" style="width:36px">
                                <input type="checkbox" id="checkAll" class="form-check-input">
                            </th>
                            <th class="text-center">#</th>
                            <th>Клиент</th>
                            <th class="text-center">Период</th>
                            <th class="text-center">Статус</th>
                            <th class="text-center">Сайтов</th>
                            <th class="text-center text-success">OK</th>
                            <th class="text-center text-warning">Warn</th>
                            <th class="text-center text-danger">Error</th>
                            <th class="text-center text-secondary">N/A</th>
                            <th class="text-center">Дата</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="r : ${runs}"
                            th:classappend="${r.status == 'FAILED'} ? 'table-danger' : (${r.status == 'RUNNING'} ? 'table-warning' : '')">
                            <td class="text-center">
                                <input type="checkbox" class="form-check-input row-check"
                                       th:value="${r.id}">
                            </td>
                            <td class="text-center" th:text="${r.id}">1</td>
                            <td th:text="${r.shop.shopName}">shop.ru</td>
                            <td class="text-center small">
                                <span th:text="${#temporals.format(r.dateFrom, 'dd.MM.yy')}"></span> —
                                <span th:text="${#temporals.format(r.dateTo, 'dd.MM.yy')}"></span>
                            </td>
                            <td class="text-center">
                                <span class="badge"
                                      th:classappend="${r.status == 'COMPLETED'} ? 'bg-success' : (${r.status == 'FAILED'} ? 'bg-danger' : 'bg-warning text-dark')"
                                      th:text="${r.status}">OK</span>
                                <span th:if="${r.timeoutCount != null and r.timeoutCount > 0}"
                                      class="badge bg-warning text-dark ms-1"
                                      th:title="${r.errorMessage}">
                                    <i class="fas fa-clock me-1"></i>TIMEOUT ×<span th:text="${r.timeoutCount}"></span>
                                </span>
                            </td>
                            <td class="text-center" th:text="${r.totalSites}">0</td>
                            <td class="text-center" th:text="${r.okCount}">0</td>
                            <td class="text-center" th:text="${r.warningCount}">0</td>
                            <td class="text-center" th:text="${r.errorCount}">0</td>
                            <td class="text-center" th:text="${r.notFoundCount}">0</td>
                            <td class="text-center small"
                                th:text="${r.startedAt != null ? #temporals.format(r.startedAt.withZoneSameInstant(T(java.time.ZoneId).systemDefault()), 'dd.MM.yy HH:mm') : ''}"></td>
                            <td class="text-center">
                                <a th:href="@{'/zoomos/check/results/' + ${r.id}}"
                                   class="btn btn-sm btn-outline-primary">
                                    <i class="fas fa-eye"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Пагинация -->
    <div id="historyPagination" class="d-flex justify-content-between align-items-center mt-2 flex-wrap gap-2" style="display:none!important">
        <span id="historyPaginationInfo" class="text-muted small"></span>
        <nav><ul class="pagination pagination-sm mb-0" id="historyPaginationPages"></ul></nav>
    </div>

    <!-- Модал подтверждения удаления -->
    <div class="modal fade" id="deleteConfirmModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Подтверждение удаления</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    Вы уверены, что хотите удалить <strong id="deleteCountText"></strong> записей истории?
                    Все связанные данные проверок будут удалены безвозвратно.
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="button" id="btnConfirmDelete" class="btn btn-danger">Удалить</button>
                </div>
            </div>
        </div>
    </div>

</div>
</th:block>

<th:block th:fragment="scripts">
<script>
    const histSearch  = document.getElementById('historySearch');
    const histCount   = document.getElementById('historyCount');
    const histClear   = document.getElementById('historySearchClear');
    const histPageSize = document.getElementById('historyPageSize');
    const checkAll    = document.getElementById('checkAll');
    const btnDelete   = document.getElementById('btnDeleteSelected');
    const selectedCnt = document.getElementById('selectedCount');
    const deleteForm  = document.getElementById('deleteForm');
    const pagination  = document.getElementById('historyPagination');
    const paginationPages = document.getElementById('historyPaginationPages');
    const paginationInfo  = document.getElementById('historyPaginationInfo');

    const PAGE_SIZE_KEY = 'zoomos-history-page-size';
    let currentPage = 1;

    // Восстановить сохранённый размер страницы
    const savedSize = localStorage.getItem(PAGE_SIZE_KEY);
    if (savedSize && histPageSize) {
        const opt = histPageSize.querySelector(`option[value="${savedSize}"]`);
        if (opt) opt.selected = true;
    }

    function getPageSize() {
        return histPageSize ? parseInt(histPageSize.value) : 25;
    }

    function filterHistory() {
        const q = histSearch ? histSearch.value.trim().toLowerCase() : '';
        const allRows = Array.from(document.querySelectorAll('tbody tr'));
        const matched = allRows.filter(r => {
            const name = r.cells[2]?.textContent.toLowerCase() || '';
            return !q || name.includes(q);
        });

        const pageSize = getPageSize();
        const totalMatched = matched.length;
        const totalPages = pageSize === 0 ? 1 : Math.ceil(totalMatched / pageSize);
        if (currentPage > totalPages) currentPage = 1;

        allRows.forEach(r => r.style.display = 'none');
        const start = pageSize === 0 ? 0 : (currentPage - 1) * pageSize;
        const end   = pageSize === 0 ? totalMatched : start + pageSize;
        matched.slice(start, end).forEach(r => r.style.display = '');

        // Счётчик
        if (histCount) {
            histCount.textContent = q ? `Найдено: ${totalMatched} из ${allRows.length}` : `Всего: ${allRows.length}`;
        }

        // Пагинация
        if (pageSize > 0 && totalPages > 1) {
            pagination.style.removeProperty('display');
            paginationInfo.textContent = `Страница ${currentPage} из ${totalPages} (${totalMatched} записей)`;
            renderPages(totalPages);
        } else {
            pagination.style.setProperty('display', 'none', 'important');
        }

        updateDeleteBtn();
    }

    function renderPages(total) {
        paginationPages.innerHTML = '';
        const prev = document.createElement('li');
        prev.className = 'page-item' + (currentPage === 1 ? ' disabled' : '');
        prev.innerHTML = '<a class="page-link" href="#">‹</a>';
        prev.addEventListener('click', e => { e.preventDefault(); if (currentPage > 1) { currentPage--; filterHistory(); }});
        paginationPages.appendChild(prev);

        // Показываем: первую, последнюю, текущую ±2
        const pages = new Set([1, total]);
        for (let i = Math.max(1, currentPage - 2); i <= Math.min(total, currentPage + 2); i++) pages.add(i);
        let last = 0;
        [...pages].sort((a,b)=>a-b).forEach(p => {
            if (last && p - last > 1) {
                const dots = document.createElement('li');
                dots.className = 'page-item disabled';
                dots.innerHTML = '<a class="page-link">…</a>';
                paginationPages.appendChild(dots);
            }
            const li = document.createElement('li');
            li.className = 'page-item' + (p === currentPage ? ' active' : '');
            li.innerHTML = `<a class="page-link" href="#">${p}</a>`;
            li.addEventListener('click', e => { e.preventDefault(); currentPage = p; filterHistory(); });
            paginationPages.appendChild(li);
            last = p;
        });

        const next = document.createElement('li');
        next.className = 'page-item' + (currentPage === total ? ' disabled' : '');
        next.innerHTML = '<a class="page-link" href="#">›</a>';
        next.addEventListener('click', e => { e.preventDefault(); if (currentPage < total) { currentPage++; filterHistory(); }});
        paginationPages.appendChild(next);
    }

    function updateDeleteBtn() {
        const checked = document.querySelectorAll('.row-check:checked');
        const count = checked.length;
        if (btnDelete) {
            btnDelete.style.display = count > 0 ? '' : 'none';
            if (selectedCnt) selectedCnt.textContent = count;
        }
    }

    if (histPageSize) {
        histPageSize.addEventListener('change', () => {
            localStorage.setItem(PAGE_SIZE_KEY, histPageSize.value);
            currentPage = 1;
            filterHistory();
        });
    }

    if (histSearch) {
        histSearch.addEventListener('input', () => { currentPage = 1; filterHistory(); });
    }
    if (histClear) {
        histClear.addEventListener('click', () => {
            if (histSearch) { histSearch.value = ''; currentPage = 1; filterHistory(); }
        });
    }

    // Инициализация
    filterHistory();

    if (checkAll) {
        checkAll.addEventListener('change', function() {
            document.querySelectorAll('.row-check').forEach(cb => {
                const row = cb.closest('tr');
                if (!row || row.style.display !== 'none') cb.checked = this.checked;
            });
            updateDeleteBtn();
        });
    }

    document.querySelectorAll('.row-check').forEach(cb => {
        cb.addEventListener('change', updateDeleteBtn);
    });

    if (btnDelete) {
        btnDelete.addEventListener('click', function() {
            const count = document.querySelectorAll('.row-check:checked').length;
            document.getElementById('deleteCountText').textContent = count;
            new bootstrap.Modal(document.getElementById('deleteConfirmModal')).show();
        });
    }

    document.getElementById('btnConfirmDelete')?.addEventListener('click', function() {
        const checked = document.querySelectorAll('.row-check:checked');
        // Добавляем hidden inputs в форму
        deleteForm.innerHTML = '';
        checked.forEach(cb => {
            const inp = document.createElement('input');
            inp.type = 'hidden';
            inp.name = 'ids';
            inp.value = cb.value;
            deleteForm.appendChild(inp);
        });
        deleteForm.submit();
    });
</script>
</th:block>
</html>
