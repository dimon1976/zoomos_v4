<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/tabler-main :: html(
        title='Результаты проверки',
        content=~{::content},
        scripts=~{::scripts},
        styles=~{::styles},
        pageTitle=${pageTitle},
        pageActions=~{::pageActions}
      )}">

<th:block th:fragment="pageActions">
    <a href="/zoomos" class="btn btn-sm btn-outline-secondary me-2">
        <i class="fas fa-arrow-left me-1"></i>Магазины
    </a>
    <a th:href="@{'/zoomos/check/history?shop=' + ${shopName}}" class="btn btn-sm btn-outline-secondary">
        <i class="fas fa-history me-1"></i>История
    </a>
</th:block>

<th:block th:fragment="styles">
<style>
:root {
    --c-critical:    #dc3545;
    --c-warning:     #fd7e14;
    --c-trend:       #0d6efd;
    --c-in-progress: #6f42c1;
    --c-ok:          #198754;
}

/* ── Status pill ── */
.status-pill {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 2px;
}
.pill-CRITICAL    { background: var(--c-critical); }
.pill-WARNING     { background: var(--c-warning); }
.pill-TREND       { background: var(--c-trend); }
.pill-IN_PROGRESS { background: var(--c-in-progress); }
.pill-OK          { background: var(--c-ok); }

/* ── Status badge ── */
.status-badge {
    font-size: .7rem;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 4px;
    color: #fff;
    white-space: nowrap;
    flex-shrink: 0;
}
.badge-CRITICAL    { background: var(--c-critical); }
.badge-WARNING     { background: var(--c-warning);  color: #000; }
.badge-TREND       { background: var(--c-trend); }
.badge-IN_PROGRESS { background: var(--c-in-progress); }
.badge-OK          { background: var(--c-ok); }

/* ── Filter button ── */
.filter-btn {
    font-size: .8rem;
    padding: 3px 10px;
    border-radius: 20px;
    border: 2px solid transparent;
    cursor: pointer;
    opacity: .35;
    transition: opacity .15s, transform .1s;
}
.filter-btn.active { opacity: 1; }
.filter-btn:hover  { transform: translateY(-1px); }
.filter-btn-CRITICAL    { background: var(--c-critical);    color: #fff; border-color: var(--c-critical); }
.filter-btn-WARNING     { background: var(--c-warning);     color: #000; border-color: var(--c-warning); }
.filter-btn-TREND       { background: var(--c-trend);       color: #fff; border-color: var(--c-trend); }
.filter-btn-IN_PROGRESS { background: var(--c-in-progress); color: #fff; border-color: var(--c-in-progress); }
.filter-btn-OK          { background: var(--c-ok);          color: #fff; border-color: var(--c-ok); }

/* ── Site group card ── */
.site-group {
    border: 1px solid #dee2e6;
    border-radius: 8px;
    margin-bottom: 6px;
    overflow: hidden;
}
.site-group.border-CRITICAL    { border-left: 4px solid var(--c-critical); }
.site-group.border-WARNING     { border-left: 4px solid var(--c-warning); }
.site-group.border-TREND       { border-left: 4px solid var(--c-trend); }
.site-group.border-IN_PROGRESS { border-left: 4px solid var(--c-in-progress); }
.site-group.border-OK          { border-left: 4px solid var(--c-ok); }

/* ── Group header row ── */
.group-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    cursor: pointer;
    user-select: none;
    background: #fff;
    transition: background .1s;
}
.group-header:hover { background: #f8f9fa; }
.group-header .site-name {
    font-weight: 600;
    font-size: .9rem;
    min-width: 0;
}
.group-header .city-tag {
    font-size: .78rem;
    color: #6c757d;
    white-space: nowrap;
}
.group-header .account-tag {
    font-size: .75rem;
    background: #e9ecef;
    border-radius: 3px;
    padding: 1px 6px;
    white-space: nowrap;
    max-width: 140px;
    overflow: hidden;
    text-overflow: ellipsis;
}
.group-header .first-reason {
    font-size: .8rem;
    color: #495057;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
.expand-btn {
    background: none;
    border: none;
    color: #6c757d;
    cursor: pointer;
    padding: 0 4px;
    font-size: .85rem;
    flex-shrink: 0;
    transition: transform .2s;
}
.expand-btn.open { transform: rotate(180deg); }

/* ── Group body ── */
.group-body {
    display: none;
    border-top: 1px solid #dee2e6;
    background: #fafbfc;
    padding: 12px 16px;
}
.group-body.open { display: block; }

/* ── Issue row ── */
.issue-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 4px 0;
    font-size: .85rem;
}
.issue-icon { flex-shrink: 0; margin-top: 2px; }
.issue-CRITICAL    .issue-icon { color: var(--c-critical); }
.issue-WARNING     .issue-icon { color: var(--c-warning); }
.issue-TREND       .issue-icon { color: var(--c-trend); }
.issue-IN_PROGRESS .issue-icon { color: var(--c-in-progress); }

/* ── Metrics grid ── */
.metrics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 6px;
    margin-top: 10px;
}
.metric-cell {
    background: #fff;
    border: 1px solid #e9ecef;
    border-radius: 6px;
    padding: 6px 10px;
}
.metric-label { font-size: .7rem; color: #6c757d; text-transform: uppercase; letter-spacing: .04em; }
.metric-value { font-size: .95rem; font-weight: 600; }
.metric-delta { font-size: .7rem; color: #6c757d; }

/* ── Progress bar ── */
.mini-progress {
    height: 4px;
    border-radius: 2px;
    background: #e9ecef;
    margin-top: 4px;
}
.mini-progress-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--c-in-progress);
    transition: width .3s;
}

/* ── Cities sub-table ── */
.cities-table { font-size: .82rem; margin-top: 8px; }
.cities-table th { font-size: .72rem; font-weight: 600; text-transform: uppercase; color: #6c757d; }

/* ── OK table ── */
.ok-collapse-header {
    background: none;
    border: 1px solid var(--c-ok);
    color: var(--c-ok);
    border-radius: 6px;
    padding: 7px 14px;
    font-size: .85rem;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    text-align: left;
    transition: background .15s;
}
.ok-collapse-header:hover { background: #d1fae5; }

/* ── Empty state ── */
.empty-state {
    text-align: center;
    padding: 48px 24px;
    color: #6c757d;
}
</style>
</th:block>

<th:block th:fragment="content">

<!-- run metadata for JS -->
<input type="hidden" id="run-id"      th:value="${runId}">
<input type="hidden" id="shop-name"   th:value="${shopName}">
<input type="hidden" id="date-from"   th:value="${dateFrom}">
<input type="hidden" id="date-to"     th:value="${dateTo}">
<input type="hidden" id="started-at"  th:value="${startedAt}">
<input type="hidden" id="base-url"    th:value="${baseUrl ?: ''}">

<!-- ── Run info bar ── -->
<div class="d-flex align-items-center gap-3 mb-3 text-muted small">
    <span><i class="fas fa-store me-1"></i><strong class="text-body" th:text="${shopName}"></strong></span>
    <span><i class="fas fa-calendar-alt me-1"></i><span th:text="${dateFromFmt} + ' — ' + ${dateToFmt}"></span></span>
    <span><i class="fas fa-clock me-1"></i>Запущено: <span th:text="${startedAt}"></span></span>
</div>

<!-- ── Status filter buttons ── -->
<div id="filter-bar" class="d-flex gap-2 flex-wrap align-items-center mb-3">
    <button class="filter-btn" data-filter="ALL" style="background:transparent;color:#495057;border-color:#dee2e6;">
        Все
    </button>
    <button class="filter-btn filter-btn-CRITICAL active" data-filter="CRITICAL">
        🔴 <span class="cnt" id="cnt-CRITICAL">—</span> критичных
    </button>
    <button class="filter-btn filter-btn-WARNING active" data-filter="WARNING">
        🟡 <span class="cnt" id="cnt-WARNING">—</span> предупреждений
    </button>
    <button class="filter-btn filter-btn-TREND" data-filter="TREND">
        📈 <span class="cnt" id="cnt-TREND">—</span> трендов
    </button>
    <button class="filter-btn filter-btn-IN_PROGRESS" data-filter="IN_PROGRESS">
        ⏳ <span class="cnt" id="cnt-IN_PROGRESS">—</span> в процессе
    </button>
    <button class="filter-btn filter-btn-OK" data-filter="OK">
        ✅ <span class="cnt" id="cnt-OK">—</span> ок
    </button>
</div>

<!-- ── Search + Type filter ── -->
<div class="d-flex gap-2 align-items-center mb-3">
    <div class="input-group input-group-sm" style="max-width:260px">
        <span class="input-group-text"><i class="fas fa-search"></i></span>
        <input type="text" id="site-search" class="form-control" placeholder="Поиск по сайту…">
    </div>
    <div class="btn-group btn-group-sm" id="type-filter">
        <button class="btn btn-outline-secondary active" data-type="ALL">Все</button>
        <button class="btn btn-outline-secondary" data-type="API">API</button>
        <button class="btn btn-outline-secondary" data-type="ITEM">ITEM</button>
    </div>
</div>

<!-- ── Loading ── -->
<div id="loading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status"></div>
    <div class="mt-2 text-muted small">Загрузка данных…</div>
</div>

<!-- ── Error ── -->
<div id="error-msg" class="alert alert-danger d-none" role="alert">
    <i class="fas fa-exclamation-triangle me-2"></i>Ошибка загрузки данных.
    <a href="javascript:location.reload()" class="alert-link ms-2">Попробовать снова</a>
</div>

<!-- ── Results list ── -->
<div id="results-list"></div>

<!-- ── OK section ── -->
<div id="ok-section" class="d-none mt-3">
    <button class="ok-collapse-header" onclick="toggleOk(this)">
        ✅ Всё в порядке (<span id="ok-count">0</span>) ▾
    </button>
    <div id="ok-list" class="d-none mt-2">
        <table class="table table-sm table-hover table-bordered">
            <thead class="table-light">
                <tr>
                    <th>Сайт</th>
                    <th>Город</th>
                    <th class="text-end">В наличии</th>
                </tr>
            </thead>
            <tbody id="ok-table-body"></tbody>
        </table>
    </div>
</div>

</th:block>

<th:block th:fragment="scripts">
<script th:src="@{/js/zoomos-check-results.js(v=3)}"></script>
</th:block>

</html>
