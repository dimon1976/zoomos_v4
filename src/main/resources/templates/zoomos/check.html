<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: html(
        title='Проверка выкачки',
        content=~{::content},
        scripts=~{::scripts},
        styles=~{::styles},
        pageTitle='Проверка выкачки',
        pageActions=~{::pageActions}
      )}">
<head><title>Проверка выкачки</title></head>

<th:block th:fragment="styles">
    <style>
        .progress-section { display: none; }
        .progress-log { max-height: 200px; overflow-y: auto; font-size: 0.85em; }
        .progress-log .log-entry { padding: 2px 0; border-bottom: 1px solid #f0f0f0; }
    </style>
</th:block>

<th:block th:fragment="pageActions">
    <a th:href="@{/zoomos}" class="btn btn-sm btn-outline-secondary">
        <i class="fas fa-arrow-left me-1"></i>Назад
    </a>
    <a th:href="@{/zoomos/check/history}" class="btn btn-sm btn-outline-info">
        <i class="fas fa-history me-1"></i>История
    </a>
</th:block>

<th:block th:fragment="content">
<div class="container-fluid">

    <!-- Форма запуска проверки -->
    <div class="card mb-4">
        <div class="card-header">
            <i class="fas fa-play-circle me-2"></i>Запуск проверки
        </div>
        <div class="card-body">
            <div class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Клиент</label>
                    <select id="shopSelect" class="form-select">
                        <option value="">— Выберите клиента —</option>
                        <option th:each="shop : ${shops}"
                                th:value="${shop.id}"
                                th:text="${shop.shopName}">shop.ru</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-semibold">Период с</label>
                    <input type="date" id="dateFrom" class="form-control">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-semibold">по</label>
                    <input type="date" id="dateTo" class="form-control">
                </div>
                <div class="col-md-1">
                    <label class="form-label fw-semibold" title="Порог падения 'В наличии' (%)">Пад.%</label>
                    <input type="number" id="dropThreshold" class="form-control" value="10" min="1" max="100">
                </div>
                <div class="col-md-1">
                    <label class="form-label fw-semibold" title="Порог роста ошибок (%)">Ош.%</label>
                    <input type="number" id="errThreshold" class="form-control" value="30" min="1" max="500">
                </div>
                <div class="col-md-2">
                    <button id="runCheckBtn" class="btn btn-primary w-100" disabled>
                        <i class="fas fa-search me-1"></i>Проверить
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Прогресс -->
    <div id="progressSection" class="card mb-4 progress-section">
        <div class="card-header">
            <i class="fas fa-spinner fa-spin me-2"></i>Проверка выполняется...
        </div>
        <div class="card-body">
            <div class="progress mb-3" style="height: 25px;">
                <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated"
                     role="progressbar" style="width: 0%;">0%</div>
            </div>
            <div id="progressLog" class="progress-log bg-light rounded p-2">
            </div>
        </div>
    </div>

    <!-- Результат (ссылка на страницу результатов) -->
    <div id="resultSection" class="card mb-4" style="display:none;">
        <div class="card-body text-center">
            <i class="fas fa-check-circle text-success fa-2x mb-2"></i>
            <h5>Проверка завершена</h5>
            <a id="resultLink" href="#" class="btn btn-primary">
                <i class="fas fa-table me-1"></i>Посмотреть результаты
            </a>
        </div>
    </div>

</div>
</th:block>

<th:block th:fragment="scripts">
<script src="/webjars/sockjs-client/1.5.1/sockjs.min.js"></script>
<script src="/webjars/stomp-websocket/2.3.4/stomp.min.js"></script>
<script>
    const shopSelect = document.getElementById('shopSelect');
    const dateFrom = document.getElementById('dateFrom');
    const dateTo = document.getElementById('dateTo');
    const runBtn = document.getElementById('runCheckBtn');
    const progressSection = document.getElementById('progressSection');
    const progressBar = document.getElementById('progressBar');
    const progressLog = document.getElementById('progressLog');
    const resultSection = document.getElementById('resultSection');
    const resultLink = document.getElementById('resultLink');

    // Дата по умолчанию: вчера — сегодня
    const today = new Date();
    const yesterday = new Date(today);
    yesterday.setDate(yesterday.getDate() - 1);
    dateTo.value = today.toISOString().split('T')[0];
    dateFrom.value = yesterday.toISOString().split('T')[0];

    // Активация кнопки
    function updateBtn() {
        runBtn.disabled = !shopSelect.value;
    }
    shopSelect.addEventListener('change', updateBtn);

    // Запуск проверки
    runBtn.addEventListener('click', function() {
        if (!shopSelect.value) return;

        runBtn.disabled = true;
        runBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i>Запуск...';
        progressSection.style.display = 'block';
        resultSection.style.display = 'none';
        progressLog.innerHTML = '';
        progressBar.style.width = '0%';
        progressBar.textContent = '0%';

        const fd = new FormData();
        fd.append('shopId', shopSelect.value);
        fd.append('dateFrom', dateFrom.value);
        fd.append('dateTo', dateTo.value);
        fd.append('dropThreshold', document.getElementById('dropThreshold').value || '10');
        fd.append('errorGrowthThreshold', document.getElementById('errThreshold').value || '30');

        fetch('/zoomos/check/run', { method: 'POST', body: fd })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    subscribeToProgress(data.operationId);
                } else {
                    alert('Ошибка: ' + (data.error || 'неизвестная'));
                    resetBtn();
                }
            })
            .catch(err => {
                alert('Ошибка сети: ' + err.message);
                resetBtn();
            });
    });

    function resetBtn() {
        runBtn.disabled = false;
        runBtn.innerHTML = '<i class="fas fa-search me-1"></i>Проверить';
    }

    function addLogEntry(msg) {
        const div = document.createElement('div');
        div.className = 'log-entry';
        div.textContent = new Date().toLocaleTimeString() + ' — ' + msg;
        progressLog.appendChild(div);
        progressLog.scrollTop = progressLog.scrollHeight;
    }

    // WebSocket подписка
    function subscribeToProgress(operationId) {
        const socket = new SockJS('/ws');
        const stompClient = Stomp.over(socket);
        stompClient.debug = null; // отключить debug лог

        stompClient.connect({}, function() {
            addLogEntry('Подключено к серверу...');

            stompClient.subscribe('/topic/zoomos-check/' + operationId, function(msg) {
                const data = JSON.parse(msg.body);
                const pct = data.percent || 0;
                progressBar.style.width = pct + '%';
                progressBar.textContent = pct + '%';
                addLogEntry(data.message);

                // Проверка завершения
                if (data.message && data.message.includes('завершена')) {
                    progressBar.classList.remove('progress-bar-animated');
                    progressBar.classList.add('bg-success');
                    progressBar.style.width = '100%';
                    progressBar.textContent = '100%';
                    resetBtn();

                    // Показываем ссылку на результаты — нужно получить runId
                    // Запрашиваем последний run для этого магазина
                    fetchLatestRunId(shopSelect.value);

                    stompClient.disconnect();
                }

                if (data.message && data.message.includes('Ошибка')) {
                    progressBar.classList.remove('progress-bar-animated');
                    progressBar.classList.add('bg-danger');
                    resetBtn();
                    stompClient.disconnect();
                }
            });
        }, function(err) {
            addLogEntry('Ошибка WebSocket: ' + err);
            resetBtn();
        });
    }

    function fetchLatestRunId(shopId) {
        fetch('/zoomos/check/latest?shopId=' + shopId)
            .then(r => r.json())
            .then(data => {
                if (data.runId) {
                    resultSection.style.display = 'block';
                    resultLink.href = '/zoomos/check/results/' + data.runId;
                }
            })
            .catch(() => {});
    }
</script>
</th:block>
</html>
