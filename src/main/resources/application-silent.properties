# =======================================================
# ТИХИЙ ПРОФИЛЬ (silent) - минимальное логирование
# =======================================================

# JPA/Hibernate - без вывода SQL
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# DevTools - работают как в dev
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Thymeleaf - без кэширования как в dev
spring.thymeleaf.cache=false

# =======================================================
# МИНИМАЛЬНОЕ ЛОГИРОВАНИЕ
# =======================================================

# Только критичные ошибки и важные сообщения
logging.level.org.springframework=WARN
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR

# Приложение - только важная информация
logging.level.com.java=WARN
logging.level.com.java.service.imports=INFO
logging.level.com.java.service.exports=INFO
logging.level.com.java.service.statistics=INFO
logging.level.com.java.service.utils=DEBUG

# Новая архитектура - минимальное логирование
logging.level.com.java.service.validation=INFO
logging.level.com.java.exception=WARN
logging.level.com.java.service.ErrorLogService=INFO
logging.level.com.java.service.ErrorNotificationService=WARN

# Отключение отладки
logging.level.com.java.service.exports.strategies=INFO
logging.level.com.java.controller=DEBUG

# Корневой уровень - только ошибки
logging.level.root=ERROR

# =======================================================
# НАСТРОЙКИ КАК В DEV НО ТИШЕ
# =======================================================

# Те же параметры что в dev для функциональности
dashboard.auto-refresh.interval=15000
dashboard.stats.cache-duration=5000

import.batch-size=100
export.batch-size=250

# Thread pools для silent - сбалансированные для тестирования
import.async.core-pool-size=1
import.async.max-pool-size=2
import.async.queue-capacity=50
import.async.thread-name-prefix=SilentImportExecutor-

export.async.core-pool-size=1  
export.async.max-pool-size=2
export.async.queue-capacity=100
export.async.thread-name-prefix=SilentExportExecutor-

spring.flyway.clean-on-validation-error=true